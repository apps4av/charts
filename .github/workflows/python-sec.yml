# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: SEC

on:
  schedule:
    - cron: "0 11 * * 0"  # 07:00 America/New_York during EDT
    - cron: "0 12 * * 0"  # 07:00 America/New_York during EST
  workflow_dispatch:
    inputs:
      force:
        description: "Build now, bypassing the Sunday 7am ET / release-week gate"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
    - uses: actions/checkout@v4
    - name: Decide whether to build
      id: check
      env:
        EVENT: ${{ github.event_name }}
        FORCE: ${{ inputs.force }}
        SCHEDULE: ${{ github.event.schedule }}
      run: python3 gate.py >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: needs.gate.outputs.run == 'true'

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        sudo apt-get install gdal-bin python3-gdal
        pip install bs4 tqdm numpy regex urllib3 glob2
    - name: Build charts
      run: |
        python3 sec.py

    - name: Upload release
      uses: actions/upload-artifact@v4
      with:
        name: SEC
        path: |
          AK_*.zip
          PAC_*.zip
          NW_*.zip
          SW_*.zip
          NC_*.zip
          EC_*.zip
          SC_*.zip
          NE_*.zip
          SE_*.zip

    - name: SSH to mamba
      uses: appleboy/scp-action@v0.1.7
      with:
        host: apps4av.org
        username: apps4av
        password: ${{ secrets.MAMBA_PASSWORD }}
        port: 22
        source: "AK_*.zip,PAC_*.zip,NW_*.zip,SW_*.zip,NC_*.zip,EC_*.zip,SC_*.zip,NE_*.zip,SE_*.zip"
        target: /home/apps4av/mamba.dreamhosters.com/new/staging